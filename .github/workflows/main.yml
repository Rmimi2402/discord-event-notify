name: Discord Event Notify

on:
  schedule:
    - cron: '0 7 * * 6'
    - cron: '0 13 * * 6'
    - cron: '49 13 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Check Tokyo time and send webhook
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
        run: |
          TZ=Asia/Tokyo

          YEAR=$(TZ=$TZ date +%Y)
          MONTH=$(TZ=$TZ date +%m)
          DAY=$(TZ=$TZ date +%d)
          HOUR=$(TZ=$TZ date +%H)
          MINUTE=$(TZ=$TZ date +%M)
          DOW=$(TZ=$TZ date +%u)
          WEEK=$(( (10#$DAY - 1) / 7 + 1 ))

          echo "Tokyo now: $(TZ=$TZ date)"
          echo "YEAR=$YEAR MONTH=$MONTH DAY=$DAY HOUR=$HOUR MINUTE=$MINUTE DOW=$DOW WEEK=$WEEK"

          MESSAGE="<@&1297168009743569029> 
> **会議通知**
会議開始の時間です。
来れる方は集合してください。"

          TEST_MESSAGE="<@&1297168009743569029> 
> **会議通知（テスト）**
テスト通知です。"

          send_webhook() {
            local content="$1"
            DISCORD_CONTENT="$content" python3 - <<'PY' > body.json
import json
import os

content = os.environ["DISCORD_CONTENT"]
print(json.dumps({"content": content}, ensure_ascii=False))
PY
            curl -X POST "$WEBHOOK" \
              -H "Content-Type: application/json" \
              --data @body.json
          }

          # テスト用
          if [ "$HOUR" = "22" ] && [ "$MINUTE" = "49" ]; then
            echo "Test schedule matched."
            send_webhook "$TEST_MESSAGE"
            exit 0
          fi

          if [ "$DOW" != "6" ]; then
            echo "Not Saturday. Skip."
            exit 0
          fi

          if { [ "$WEEK" = "1" ] || [ "$WEEK" = "3" ]; } && [ "$HOUR" = "16" ] && [ "$MINUTE" = "00" ]; then
            echo "Matched 1st/3rd Saturday 16:00 JST"
            send_webhook "$MESSAGE"
            exit 0
          fi

          if { [ "$WEEK" = "2" ] || [ "$WEEK" = "4" ]; } && [ "$HOUR" = "22" ] && [ "$MINUTE" = "00" ]; then
            echo "Matched 2nd/4th Saturday 22:00 JST"
            send_webhook "$MESSAGE"
            exit 0
          fi

          echo "No condition matched. Skip."
