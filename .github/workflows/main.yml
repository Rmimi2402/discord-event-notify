name: Discord Event Notify

on:
  schedule:
    # 第1・第3土曜 16:00 JST 用
    - cron: '0 7 * * 6'
    # 第2・第4土曜 22:00 JST 用
    - cron: '0 13 * * 6'
    # テスト用（毎日 22:35 JST に実行）
    - cron: '44 13 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Check Tokyo time and send webhook
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
        run: |
          TZ=Asia/Tokyo

          YEAR=$(TZ=$TZ date +%Y)
          MONTH=$(TZ=$TZ date +%m)
          DAY=$(TZ=$TZ date +%d)
          HOUR=$(TZ=$TZ date +%H)
          MINUTE=$(TZ=$TZ date +%M)
          DOW=$(TZ=$TZ date +%u)   # 1=Mon ... 6=Sat 7=Sun
          WEEK=$(( (10#$DAY - 1) / 7 + 1 ))

          echo "Tokyo now: $(TZ=$TZ date)"
          echo "YEAR=$YEAR MONTH=$MONTH DAY=$DAY HOUR=$HOUR MINUTE=$MINUTE DOW=$DOW WEEK=$WEEK"

          MESSAGE="<@&1297168009743569029> \n> **会議通知**\n会議開始の時間です。\n来れる方は集合してください。"

          TEST_MESSAGE="<@&1297168009743569029> \n> **会議通知（テスト）**\nテスト通知です。"

          send_webhook() {
            local content="$1"
            curl -X POST "$WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$(printf '{"content":"%s"}' "$content" | sed 's/\\/\\\\/g; s/"/\\"/g')"
          }

          # -------------------------
          # テスト用
          # 毎日 22:44 JST に通知
          # 不要になったらこの if ブロックごと消してOK
          # -------------------------
          if [ "$HOUR" = "22" ] && [ "$MINUTE" = "44" ]; then
            echo "Test schedule matched."
            send_webhook "$TEST_MESSAGE"
            exit 0
          fi

          # 土曜日以外は終了
          if [ "$DOW" != "6" ]; then
            echo "Not Saturday. Skip."
            exit 0
          fi

          # 第1・第3土曜 16:00 JST
          if { [ "$WEEK" = "1" ] || [ "$WEEK" = "3" ]; } && [ "$HOUR" = "16" ] && [ "$MINUTE" = "00" ]; then
            echo "Matched 1st/3rd Saturday 16:00 JST"
            send_webhook "$MESSAGE"
            exit 0
          fi

          # 第2・第4土曜 22:00 JST
          if { [ "$WEEK" = "2" ] || [ "$WEEK" = "4" ]; } && [ "$HOUR" = "22" ] && [ "$MINUTE" = "00" ]; then
            echo "Matched 2nd/4th Saturday 22:00 JST"
            send_webhook "$MESSAGE"
            exit 0
          fi

          echo "No condition matched. Skip."
